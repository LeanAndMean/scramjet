name: Release

# Publishes all packages to npm when a version tag is pushed.
# The release ritual (mach12:pr-merge Step 5) already runs `gh release create v<x>`,
# which pushes the tag — that tag push is what triggers this job.
on:
  push:
    # v[0-9]* (not v*) so only version tags fire this, never stray `v...` tags.
    tags: ["v[0-9]*"]

# Least privilege: publish auth is the NPM_TOKEN secret, so the job needs no
# write scope on GITHUB_TOKEN. Read-only contents is all the checkout requires.
permissions:
  contents: read

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    # Never run two publishes for the same tag concurrently; never cancel a
    # publish mid-flight (a half-published version is the one thing to avoid).
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r '.version' packages/scramjet/package.json)
          if [ "$TAG" != "$PKG" ]; then
            echo "Error: git tag v$TAG does not match packages/scramjet/package.json version $PKG." >&2
            echo "Bump packages/scramjet/package.json to match the release tag before tagging." >&2
            exit 1
          fi
          echo "OK: tag and package.json agree on $PKG."

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Publish runtime packages
        # Publish workspace packages first (order matters: tui, ai, agent,
        # coding-agent). These are dependencies of @leanandmean/scramjet.
        # Tolerate "already published" (version exists) but fail on real errors.
        run: |
          for pkg in tui ai agent coding-agent; do
            echo "Publishing @leanandmean/$pkg..."
            OUTPUT=$(npm publish -w "packages/$pkg" --access public 2>&1) && continue
            if echo "$OUTPUT" | grep -qiE "previously published|EPUBLISHCONFLICT|code E409|already exists"; then
              echo "Already published: @leanandmean/$pkg (skipping)"
            else
              echo "$OUTPUT" >&2
              echo "Error: failed to publish @leanandmean/$pkg" >&2
              exit 1
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @leanandmean/scramjet
        working-directory: packages/scramjet
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
