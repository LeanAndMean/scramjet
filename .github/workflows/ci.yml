name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Shellcheck install.sh / uninstall.sh
        run: shellcheck -s bash install.sh uninstall.sh

      - name: piTestedVersion drift guard
        run: |
          TESTED=$(jq -r '.pi.piTestedVersion' package.json)
          AGENT_PIN=$(jq -r '.devDependencies["@earendil-works/pi-coding-agent"]' package.json)
          TUI_PIN=$(jq -r '.devDependencies["@earendil-works/pi-tui"]' package.json)
          if [ "$TESTED" != "$AGENT_PIN" ] || [ "$TESTED" != "$TUI_PIN" ]; then
            echo "Error: pi.piTestedVersion ($TESTED) does not match the pinned @earendil-works deps." >&2
            echo "  pi-coding-agent: $AGENT_PIN" >&2
            echo "  pi-tui:          $TUI_PIN" >&2
            echo "Bump all three together so users have one source of truth." >&2
            exit 1
          fi
          echo "OK: piTestedVersion ($TESTED) matches pinned pi-coding-agent and pi-tui."

      - name: install.sh / uninstall.sh smoke test
        run: |
          # --local routes the shim into a dir not on PATH, so the
          # PATH-warning branch must fire. grep -F: $ is regex end-of-line.
          # --no-plugins skips plugin clones; hermetic plugin coverage lives
          # in the dedicated steps below.
          OUTPUT=$(./install.sh --local --no-plugins 2>&1)
          echo "$OUTPUT" | grep -qF 'is not on your $PATH'
          echo "$OUTPUT" | grep -qF 'export PATH='
          test -L .pi/extensions/scramjet
          test -r .pi/extensions/scramjet/index.ts
          test -L .pi/bin/scramjet
          test -x .pi/bin/scramjet
          # --no-plugins manifest content: only the subagent extension was
          # tracked (no plugin agents, no plugin command symlinks). Strip
          # comments and blank lines, then assert the entry list is exactly
          # the subagent symlink path.
          test -f .pi/.scramjet-manifest
          subagent_path="$(cd .pi/extensions && pwd -P)/subagent"
          entries=$(grep -Ev '^[[:space:]]*(#|$)' .pi/.scramjet-manifest)
          test "$entries" = "$subagent_path"
          ./install.sh --local --no-plugins
          test -L .pi/extensions/scramjet
          test -L .pi/bin/scramjet
          ./uninstall.sh --local --clear-manifest
          ! test -e .pi/extensions/scramjet
          ! test -e .pi/bin/scramjet
          ! test -e .pi/extensions/subagent
          ! test -e .pi/.scramjet-manifest
          ./uninstall.sh --local --clear-manifest
          rm -rf .pi

      - name: Pi subagent example path stability guard
        run: |
          # If Pi renames or restructures the bundled subagent example,
          # install.sh's symlink target breaks. Catch that drift here rather
          # than at a user's install time.
          SUBAGENT=node_modules/@earendil-works/pi-coding-agent/examples/extensions/subagent
          test -d "$SUBAGENT"
          test -f "$SUBAGENT/index.ts"
          grep -qF "pi.registerTool" "$SUBAGENT/index.ts"
          grep -qF "export default function" "$SUBAGENT/index.ts"

      - name: registerToolAliases invocation stability guard
        run: |
          # A refactor that drops the registerToolAliases(pi) call from
          # index.ts would silently ship plugin agents without their tool-
          # name restrictions wired up. Catch that drift the same way we
          # catch subagent-path drift.
          test -f index.ts
          grep -qF "registerToolAliases(pi)" index.ts

      - name: install.sh / uninstall.sh hermetic plugin wiring
        run: |
          # Hermetic end-to-end test of plugin wiring with file:// fixtures.
          # Verifies the agent-file transform (model: inherit strip, tools:
          # array conversion), command symlinking, manifest contents,
          # idempotent re-run, and clean uninstall via --clear-manifest.
          rm -rf .pi
          work=$(mktemp -d)
          trap "rm -rf $work .pi" EXIT

          # --- mach10 fixture: agent with `model: inherit` + YAML-array
          # tools, plus a command file. Tagged v1.0.0 for the semver path.
          mkdir -p "$work/mach10-src/agents" "$work/mach10-src/commands"
          cat >"$work/mach10-src/agents/inherit-agent.md" <<'AGENT'
          ---
          name: inherit-agent
          description: Test agent with model inherit
          model: inherit
          tools: ["Read", "Bash"]
          ---
          inherit-agent body
          AGENT
          cat >"$work/mach10-src/commands/test-cmd.md" <<'CMD'
          ---
          description: Test command
          ---
          test-cmd body
          CMD
          git -C "$work/mach10-src" init -q
          git -C "$work/mach10-src" config user.email "ci@example.com"
          git -C "$work/mach10-src" config user.name "CI"
          git -C "$work/mach10-src" add -A
          git -C "$work/mach10-src" commit -q -m init
          git -C "$work/mach10-src" tag v1.0.0
          git clone --bare --quiet "$work/mach10-src" "$work/mach10.git"

          # --- marketplace fixture: feature-dev with model: sonnet,
          # pr-review-toolkit with model: opus (neither should be stripped).
          mkdir -p "$work/marketplace-src/plugins/feature-dev/agents"
          mkdir -p "$work/marketplace-src/plugins/pr-review-toolkit/agents"
          cat >"$work/marketplace-src/plugins/feature-dev/agents/sonnet-agent.md" <<'AGENT'
          ---
          name: sonnet-agent
          description: Test agent with model sonnet
          model: sonnet
          ---
          sonnet-agent body
          AGENT
          # Block-sequence tools: variant exercises the other transform path.
          cat >"$work/marketplace-src/plugins/feature-dev/agents/block-tools-agent.md" <<'AGENT'
          ---
          name: block-tools-agent
          description: Test block-sequence tools array
          tools:
            - Read
            - Write
          ---
          block-tools-agent body
          AGENT
          cat >"$work/marketplace-src/plugins/pr-review-toolkit/agents/opus-agent.md" <<'AGENT'
          ---
          name: opus-agent
          description: Test agent with model opus
          model: opus
          ---
          opus-agent body
          AGENT
          git -C "$work/marketplace-src" init -q
          git -C "$work/marketplace-src" config user.email "ci@example.com"
          git -C "$work/marketplace-src" config user.name "CI"
          git -C "$work/marketplace-src" add -A
          git -C "$work/marketplace-src" commit -q -m init
          git clone --bare --quiet "$work/marketplace-src" "$work/marketplace.git"

          # --- Install with hermetic clones.
          SCRAMJET_CACHE="$work/cache" \
            MACH10_REPO="file://$work/mach10.git" \
            MARKETPLACE_REPO="file://$work/marketplace.git" \
            ./install.sh --local

          # --- Transform assertions: model: inherit stripped, sonnet/opus
          # preserved, tools YAML array converted to comma-string.
          INHERIT=.pi/agents/mach10:inherit-agent.md
          test -f "$INHERIT"
          ! grep -q '^model:' "$INHERIT"
          grep -qF 'tools: Read, Bash' "$INHERIT"
          grep -qF 'inherit-agent body' "$INHERIT"

          SONNET=.pi/agents/feature-dev:sonnet-agent.md
          test -f "$SONNET"
          grep -qF 'model: sonnet' "$SONNET"

          # Block-sequence tools: must convert to comma-string form.
          BLOCK=.pi/agents/feature-dev:block-tools-agent.md
          test -f "$BLOCK"
          grep -qF 'tools: Read, Write' "$BLOCK"
          ! grep -qE '^\s*-\s+Read' "$BLOCK"

          OPUS=.pi/agents/pr-review-toolkit:opus-agent.md
          test -f "$OPUS"
          grep -qF 'model: opus' "$OPUS"

          # --- Command file is a symlink, not a transformed copy.
          CMD=.pi/prompts/mach10:test-cmd.md
          test -L "$CMD"
          test "$(readlink "$CMD")" = "$work/cache/mach10/commands/test-cmd.md"

          # --- Subagent extension symlink lands.
          test -L .pi/extensions/subagent

          # --- Manifest sentinel + entries.
          MANIFEST=.pi/.scramjet-manifest
          test -f "$MANIFEST"
          head -n1 "$MANIFEST" | grep -qF '# scramjet manifest v1'
          grep -qxF "$PWD/.pi/agents/mach10:inherit-agent.md" "$MANIFEST"
          grep -qxF "$PWD/.pi/agents/feature-dev:sonnet-agent.md" "$MANIFEST"
          grep -qxF "$PWD/.pi/agents/feature-dev:block-tools-agent.md" "$MANIFEST"
          grep -qxF "$PWD/.pi/agents/pr-review-toolkit:opus-agent.md" "$MANIFEST"
          grep -qxF "$PWD/.pi/prompts/mach10:test-cmd.md" "$MANIFEST"
          grep -qxF "$PWD/.pi/extensions/subagent" "$MANIFEST"

          # --- Idempotent re-run: same manifest contents.
          MANIFEST_BEFORE=$(sort "$MANIFEST")
          SCRAMJET_CACHE="$work/cache" \
            MACH10_REPO="file://$work/mach10.git" \
            MARKETPLACE_REPO="file://$work/marketplace.git" \
            ./install.sh --local
          MANIFEST_AFTER=$(sort "$MANIFEST")
          test "$MANIFEST_BEFORE" = "$MANIFEST_AFTER"
          test -f "$INHERIT"
          test -f "$SONNET"

          # --- Uninstall with --clear-manifest removes everything.
          ./uninstall.sh --local --clear-manifest
          ! test -e "$INHERIT"
          ! test -e "$SONNET"
          ! test -e "$BLOCK"
          ! test -e "$OPUS"
          ! test -e "$CMD"
          ! test -e .pi/extensions/subagent
          ! test -e "$MANIFEST"
          ! test -e .pi/extensions/scramjet
          ! test -e .pi/bin/scramjet

      - name: install.sh override-flag happy path
        run: |
          # --mach10 / --feature-dev / --pr-review-toolkit all override the
          # managed clone path. With all three present, git is not required
          # and no network access happens. Source dirs must be untouched.
          rm -rf .pi
          work=$(mktemp -d)
          trap "rm -rf $work .pi" EXIT

          mkdir -p "$work/m10/agents" "$work/m10/commands"
          cat >"$work/m10/agents/a.md" <<'AGENT'
          ---
          name: a
          description: m10 agent
          ---
          m10 a body
          AGENT
          cat >"$work/m10/commands/c.md" <<'CMD'
          ---
          description: m10 command
          ---
          m10 c body
          CMD

          mkdir -p "$work/fd/agents"
          cat >"$work/fd/agents/b.md" <<'AGENT'
          ---
          name: b
          description: fd agent
          ---
          fd b body
          AGENT

          mkdir -p "$work/prt/agents"
          cat >"$work/prt/agents/d.md" <<'AGENT'
          ---
          name: d
          description: prt agent
          ---
          prt d body
          AGENT

          # Snapshot inputs so we can prove the install side never mutates them.
          M10_AGENT_BEFORE=$(cat "$work/m10/agents/a.md")
          FD_AGENT_BEFORE=$(cat "$work/fd/agents/b.md")
          PRT_AGENT_BEFORE=$(cat "$work/prt/agents/d.md")

          SCRAMJET_CACHE="$work/cache" \
            ./install.sh --local \
            --mach10 "$work/m10" \
            --feature-dev "$work/fd" \
            --pr-review-toolkit "$work/prt"

          # Installed copies / symlinks exist where wire_plugin places them.
          test -f .pi/agents/mach10:a.md
          test -L .pi/prompts/mach10:c.md
          test "$(readlink .pi/prompts/mach10:c.md)" = "$work/m10/commands/c.md"
          test -f .pi/agents/feature-dev:b.md
          test -f .pi/agents/pr-review-toolkit:d.md

          # Override source files are byte-for-byte unchanged.
          test "$(cat "$work/m10/agents/a.md")" = "$M10_AGENT_BEFORE"
          test "$(cat "$work/fd/agents/b.md")" = "$FD_AGENT_BEFORE"
          test "$(cat "$work/prt/agents/d.md")" = "$PRT_AGENT_BEFORE"

          # No managed clones happened (override flags suppress them).
          # SCRAMJET_CACHE pin makes this assertion meaningful: install.sh
          # would clone into $work/cache, not the default $HOME path.
          ! test -d "$work/cache"

          ./uninstall.sh --local --clear-manifest

      - name: install.sh refuses dirty managed clone
        run: |
          # First install populates $SCRAMJET_CACHE with a managed mach10
          # clone. Touching an untracked file inside makes the next install
          # exit non-zero with an actionable message pointing at the
          # override-flag escape hatch. Only the mach10 managed clone is
          # exercised here; feature-dev and pr-review-toolkit use empty
          # override dirs to skip the marketplace clone entirely.
          rm -rf .pi
          work=$(mktemp -d)
          trap "rm -rf $work .pi" EXIT

          # Minimal mach10 fixture (single agent) tagged v1.0.0 for semver.
          mkdir -p "$work/mach10-src/agents"
          cat >"$work/mach10-src/agents/x.md" <<'AGENT'
          ---
          name: x
          description: minimal
          ---
          x body
          AGENT
          git -C "$work/mach10-src" init -q
          git -C "$work/mach10-src" config user.email "ci@example.com"
          git -C "$work/mach10-src" config user.name "CI"
          git -C "$work/mach10-src" add -A
          git -C "$work/mach10-src" commit -q -m init
          git -C "$work/mach10-src" tag v1.0.0
          git clone --bare --quiet "$work/mach10-src" "$work/mach10.git"

          # Empty override dirs for feature-dev and pr-review-toolkit.
          # wire_plugin's loops are no-ops on dirs without agents/ or commands/.
          mkdir -p "$work/fd" "$work/prt"

          # First install seeds the managed mach10 clone.
          SCRAMJET_CACHE="$work/cache" \
            MACH10_REPO="file://$work/mach10.git" \
            ./install.sh --local \
            --feature-dev "$work/fd" \
            --pr-review-toolkit "$work/prt"

          # Dirty the managed mach10 clone.
          touch "$work/cache/mach10/UNTRACKED-FILE"

          # Re-run must refuse; capture stderr/stdout and exit code.
          STATUS=0
          OUTPUT=$(SCRAMJET_CACHE="$work/cache" \
            MACH10_REPO="file://$work/mach10.git" \
            ./install.sh --local \
            --feature-dev "$work/fd" \
            --pr-review-toolkit "$work/prt" 2>&1) || STATUS=$?
          test "$STATUS" -ne 0
          echo "$OUTPUT" | grep -qF "uncommitted changes"
          echo "$OUTPUT" | grep -qF -- "--mach10"

          # Untracked file must still be there (no destructive cleanup).
          test -f "$work/cache/mach10/UNTRACKED-FILE"

          ./uninstall.sh --local --clear-manifest

      - name: install.sh aborts on mid-plugin transform failure
        run: |
          # An agent file with `tools: []` is unrepresentable in Pi: the
          # transform must fail loud and the install must abort with a
          # non-zero exit code rather than silently dropping the agent. The
          # malformed agent must never land in <AGENT_DIR>/agents/ and must
          # never be recorded in the manifest, so a future /mach10:<cmd>
          # delegation cannot bind to a half-installed subagent.
          #
          # Two agents are placed in the fixture so the loop has a chance to
          # transform one before tripping over the bad one. Whether the good
          # agent lands before the failure is glob-order-dependent (a.md vs
          # bad-z.md) and not asserted; what IS asserted is that the bad
          # agent is absent from both the agent dir and the manifest.
          rm -rf .pi
          work=$(mktemp -d)
          trap "rm -rf $work .pi" EXIT

          mkdir -p "$work/m10/agents"
          cat >"$work/m10/agents/a.md" <<'AGENT'
          ---
          name: a
          description: valid agent
          tools: [Read]
          ---
          a body
          AGENT
          # tools: [] is the "no tools allowed" shape Pi cannot express, so
          # the transform module exits 1 and the bash wrapper aborts.
          cat >"$work/m10/agents/bad-z.md" <<'AGENT'
          ---
          name: bad-z
          description: malformed agent (tools: [])
          tools: []
          ---
          bad body
          AGENT

          mkdir -p "$work/fd" "$work/prt"

          STATUS=0
          OUTPUT=$(SCRAMJET_CACHE="$work/cache" \
            ./install.sh --local \
            --mach10 "$work/m10" \
            --feature-dev "$work/fd" \
            --pr-review-toolkit "$work/prt" 2>&1) || STATUS=$?
          test "$STATUS" -ne 0

          # Error message identifies the offending source path and the
          # specific failure mode (silent privilege escalation otherwise).
          echo "$OUTPUT" | grep -qF "bad-z.md"
          echo "$OUTPUT" | grep -qF "tools: []"
          echo "$OUTPUT" | grep -qF "refusing to continue partial install"

          # The malformed agent never landed.
          ! test -e .pi/agents/mach10:bad-z.md

          # If a manifest was written, it must not list the bad agent.
          # (Manifest write may have happened on a prior partial-install
          # attempt or not at all; either way, the bad path is unwelcome.)
          if [ -f .pi/.scramjet-manifest ]; then
            ! grep -qF ":bad-z.md" .pi/.scramjet-manifest
          fi

          # Override source files are byte-for-byte unchanged.
          test -f "$work/m10/agents/a.md"
          test -f "$work/m10/agents/bad-z.md"
          grep -qF "tools: []" "$work/m10/agents/bad-z.md"

          ./uninstall.sh --local --clear-manifest 2>/dev/null || true
          rm -rf .pi

      - name: install.sh PATH-warning suppression
        run: |
          # When --bin-dir points at a directory already on PATH, the warning
          # must NOT fire.
          tmp_bin=$(mktemp -d)
          tmp_ext=$(mktemp -d)
          OUTPUT=$(PATH="$tmp_bin:$PATH" ./install.sh --target "$tmp_ext" --bin-dir "$tmp_bin" 2>&1)
          ! echo "$OUTPUT" | grep -qF 'is not on your $PATH'
          ./uninstall.sh --target "$tmp_ext" --bin-dir "$tmp_bin"
          rm -rf "$tmp_bin" "$tmp_ext"

      - name: install.sh / uninstall.sh symlink-only safety
        run: |
          # Pre-create a real file at the shim destination. install.sh must
          # refuse (without --force), leave the file untouched, and emit the
          # F2 partial-install note. uninstall.sh must skip the real file.
          mkdir -p .pi/bin
          echo "user-shim" > .pi/bin/scramjet
          chmod +x .pi/bin/scramjet
          if OUTPUT=$(./install.sh --local 2>&1); then
            echo "expected install to fail" >&2; exit 1
          fi
          test "$(cat .pi/bin/scramjet)" = "user-shim"
          echo "$OUTPUT" | grep -q "shim install failed"
          ./uninstall.sh --local
          test -f .pi/bin/scramjet
          test ! -L .pi/bin/scramjet
          test "$(cat .pi/bin/scramjet)" = "user-shim"
          rm -rf .pi

          # Pre-create a real directory at the extension destination.
          # install.sh must refuse at the extension leg (before the F2 trap
          # is registered, so the partial-install note must NOT appear);
          # uninstall.sh must leave the directory untouched.
          mkdir -p .pi/extensions/scramjet
          echo "user-content" > .pi/extensions/scramjet/marker
          if OUTPUT=$(./install.sh --local 2>&1); then
            echo "expected install to fail" >&2; exit 1
          fi
          ! echo "$OUTPUT" | grep -q "shim install failed"
          test -d .pi/extensions/scramjet
          test ! -L .pi/extensions/scramjet
          test "$(cat .pi/extensions/scramjet/marker)" = "user-content"
          ./uninstall.sh --local
          test -d .pi/extensions/scramjet
          test "$(cat .pi/extensions/scramjet/marker)" = "user-content"
          rm -rf .pi

      - name: install.sh / uninstall.sh models.json round trip
        run: |
          # Verify install.sh's merge logic against a pre-seeded models.json
          # with a user-set apiKey and an unrelated `openai` provider:
          #   1. install must add providers.anthropic.baseUrl + compat
          #      without disturbing the apiKey or the openai block.
          #   2. --clear-models-json must remove only what install wrote,
          #      preserving the apiKey and the openai block.
          tmp_agent=$(mktemp -d)
          tmp_ext=$(mktemp -d)
          tmp_bin=$(mktemp -d)
          printf '%s\n' '{"providers":{"anthropic":{"apiKey":"user-supplied"},"openai":{"baseUrl":"https://api.openai.com"}}}' > "$tmp_agent/models.json"
          PI_CODING_AGENT_DIR="$tmp_agent" \
            ANTHROPIC_BASE_URL="https://proxy.test/anthropic" \
            ./install.sh --target "$tmp_ext" --bin-dir "$tmp_bin"
          node -e '
            const cfg = JSON.parse(require("fs").readFileSync(process.argv[1], "utf8"));
            const a = cfg.providers.anthropic;
            if (a.baseUrl !== "https://proxy.test/anthropic") { console.error("baseUrl not set"); process.exit(1); }
            if (a.compat.supportsEagerToolInputStreaming !== false) { console.error("compat not set"); process.exit(1); }
            if (a.apiKey !== "user-supplied") { console.error("apiKey clobbered"); process.exit(1); }
            if (cfg.providers.openai.baseUrl !== "https://api.openai.com") { console.error("openai clobbered"); process.exit(1); }
          ' "$tmp_agent/models.json"
          PI_CODING_AGENT_DIR="$tmp_agent" \
            ./uninstall.sh --target "$tmp_ext" --bin-dir "$tmp_bin" --clear-models-json
          node -e '
            const cfg = JSON.parse(require("fs").readFileSync(process.argv[1], "utf8"));
            const a = cfg.providers.anthropic || {};
            if ("baseUrl" in a) { console.error("baseUrl not cleared"); process.exit(1); }
            if ("compat" in a) { console.error("compat not cleared"); process.exit(1); }
            if (a.apiKey !== "user-supplied") { console.error("apiKey lost during clear"); process.exit(1); }
            if (cfg.providers.openai.baseUrl !== "https://api.openai.com") { console.error("openai lost during clear"); process.exit(1); }
          ' "$tmp_agent/models.json"
          rm -rf "$tmp_agent" "$tmp_ext" "$tmp_bin"

      - name: install.sh refuses invalid existing models.json
        run: |
          # F1: a malformed models.json must abort install with non-zero exit.
          tmp_agent=$(mktemp -d)
          tmp_ext=$(mktemp -d)
          tmp_bin=$(mktemp -d)
          printf '%s' '{ not json' > "$tmp_agent/models.json"
          STATUS=0
          OUTPUT=$(PI_CODING_AGENT_DIR="$tmp_agent" \
            ANTHROPIC_BASE_URL="https://proxy.test/anthropic" \
            ./install.sh --target "$tmp_ext" --bin-dir "$tmp_bin" 2>&1) || STATUS=$?
          test "$STATUS" -ne 0
          echo "$OUTPUT" | grep -qF 'refusing to overwrite'
          # The malformed file must be left exactly as-is.
          test "$(cat "$tmp_agent/models.json")" = '{ not json'
          rm -rf "$tmp_agent" "$tmp_ext" "$tmp_bin"

      - name: scramjet shim absent-pi error
        run: |
          # Shim should exit non-zero with an actionable message when pi is absent.
          # We invoke the shim directly so installation isn't required.
          if OUTPUT=$(PATH=/usr/bin:/bin ./bin/scramjet 2>&1); then
            echo "expected shim to fail when pi absent" >&2; exit 1
          fi
          echo "$OUTPUT" | grep -q "pi-mono"

      - name: scramjet shim happy-path arg forwarding
        run: |
          # Stub pi on PATH that echoes its argv and exits with a sentinel code,
          # verifying that the shim actually execs pi and forwards "$@" intact.
          tmp=$(mktemp -d)
          cat >"$tmp/pi" <<'STUB'
          #!/usr/bin/env bash
          echo "STUB pi argv: $*"
          exit 42
          STUB
          chmod +x "$tmp/pi"
          STATUS=0
          OUTPUT=$(PATH="$tmp:$PATH" ./bin/scramjet --foo bar baz) || STATUS=$?
          test "$STATUS" -eq 42
          echo "$OUTPUT" | grep -q "STUB pi argv: --foo bar baz"
          rm -rf "$tmp"
