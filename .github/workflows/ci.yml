name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        # --ignore-scripts skips postinstall; CI doesn't need Mach 12 seeded.
        run: npm ci --ignore-scripts

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Published coding-agent docs import guard
        run: |
          set -euo pipefail
          if grep -R -nE '@leanandmean/pi-|@earendil-works/pi-|@mariozechner/pi-' packages/coding-agent/README.md packages/coding-agent/docs packages/coding-agent/examples; then
            echo "Found stale package imports in published coding-agent docs/examples." >&2
            exit 1
          fi

      - name: npm pack round-trip smoke
        # Pack every publishable package, verify Scramjet tarball contents,
        # install the local tarballs, and run the installed binary.
        run: |
          set -euo pipefail
          PACK_DIR=$(mktemp -d)
          PREFIX=$(mktemp -d)
          npm pack -w packages/tui --pack-destination "$PACK_DIR"
          npm pack -w packages/ai --pack-destination "$PACK_DIR"
          npm pack -w packages/agent --pack-destination "$PACK_DIR"
          npm pack -w packages/coding-agent --pack-destination "$PACK_DIR"
          npm pack -w packages/scramjet --pack-destination "$PACK_DIR"
          SCRAMJET_TARBALL=$(ls "$PACK_DIR"/leanandmean-scramjet-*.tgz | head -n1)
          test -n "$SCRAMJET_TARBALL" || { echo "no Scramjet tarball produced" >&2; exit 1; }
          TARBALL_CONTENTS=$(mktemp)
          tar -tzf "$SCRAMJET_TARBALL" > "$TARBALL_CONTENTS"
          grep -qF 'package/dist/index.js' "$TARBALL_CONTENTS"
          grep -qF 'package/bin/scramjet.js' "$TARBALL_CONTENTS"
          grep -qF 'package/scripts/postinstall.js' "$TARBALL_CONTENTS"
          grep -qF 'package/mach12/commands/mach12:issue-create.md' "$TARBALL_CONTENTS"
          grep -qF 'package/mach12/agents/mach12:code-explorer.md' "$TARBALL_CONTENTS"
          XDG_DATA_HOME="$PREFIX/data" npm install --prefix "$PREFIX" -g \
            "$PACK_DIR"/leanandmean-tui-*.tgz \
            "$PACK_DIR"/leanandmean-ai-*.tgz \
            "$PACK_DIR"/leanandmean-agent-*.tgz \
            "$PACK_DIR"/leanandmean-coding-agent-*.tgz \
            "$SCRAMJET_TARBALL"
          XDG_DATA_HOME="$PREFIX/data" "$PREFIX/bin/scramjet" --help >/dev/null
          rm -rf "$PACK_DIR" "$PREFIX" "$TARBALL_CONTENTS"

      - name: postinstall script smoke
        # Run the postinstall script directly against a temporary
        # XDG_DATA_HOME and verify it seeds mach12/ idempotently.
        run: |
          set -euo pipefail
          TMP=$(mktemp -d)
          XDG_DATA_HOME="$TMP" node packages/scramjet/scripts/postinstall.js
          test -d "$TMP/scramjet/mach12/commands"
          test -d "$TMP/scramjet/mach12/agents"
          test -f "$TMP/scramjet/mach12/commands/mach12:issue-create.md"
          # Second run: idempotent (no-op, preserves user edits).
          echo "user edit" > "$TMP/scramjet/mach12/USER-MARKER"
          XDG_DATA_HOME="$TMP" node packages/scramjet/scripts/postinstall.js
          test -f "$TMP/scramjet/mach12/USER-MARKER"
          rm -rf "$TMP"
